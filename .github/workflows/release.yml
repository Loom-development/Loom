name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PNPM
        run: npm install -g pnpm@10.6.5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: "@loomdev"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify with coverage gate
        run: pnpm verify:coverage

      - name: Build release assets
        run: node scripts/build-release-assets.mjs

      - name: Build npm CLI package
        if: startsWith(github.ref, 'refs/tags/v')
        run: pnpm --dir apps/cli build

      - name: Pack npm CLI package
        if: startsWith(github.ref, 'refs/tags/v')
        run: pnpm --dir apps/cli pack --pack-destination ../../dist/release

      - name: Verify npm auth
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is missing or empty." >&2
            exit 1
          fi

          npm whoami --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail

          tag="${{ github.ref_name }}"
          title="Release $tag"
          mapfile -t files < <(find dist/release -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.tgz' \) | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found in dist/release" >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title"
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --title "$title" --notes ""
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish npm CLI package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail

          package_tarball="$(ls -1 dist/release/loomdev-cli-*.tgz | tail -n1)"
          if [ -z "$package_tarball" ]; then
            echo "No packed npm CLI tarball found in dist/release" >&2
            exit 1
          fi

          npm publish "$package_tarball" --access public --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
