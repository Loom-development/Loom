name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release assets
        run: node scripts/build-release-assets.mjs

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/loom-linux-x64.tar.gz
            dist/release/loom-linux-arm64.tar.gz
            dist/release/loom-darwin-x64.tar.gz
            dist/release/loom-darwin-arm64.tar.gz
            dist/release/loom-windows-x64.zip
            dist/release/loom-windows-arm64.zip
