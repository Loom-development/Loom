name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify with coverage gate
        run: pnpm verify:coverage

      - name: Build release assets
        run: node scripts/build-release-assets.mjs

      - name: Build npm CLI package
        if: startsWith(github.ref, 'refs/tags/v')
        run: pnpm --dir apps/cli build

      - name: Publish npm CLI package
        if: startsWith(github.ref, 'refs/tags/v')
        run: pnpm publish apps/cli --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.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 }}

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/loom-linux-x64.tar.gz
            dist/release/loom-linux-arm64.tar.gz
            dist/release/loom-darwin-x64.tar.gz
            dist/release/loom-darwin-arm64.tar.gz
            dist/release/loom-windows-x64.zip
            dist/release/loom-windows-arm64.zip
