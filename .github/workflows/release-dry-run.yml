name: Release Dry Run

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


permissions:
  contents: read

jobs:
  build-release-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify with coverage gate and report output
        run: pnpm verify:coverage

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: loom-coverage-${{ github.sha }}
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
          if-no-files-found: error

      - name: Build release assets
        run: node scripts/build-release-assets.mjs

      - name: Build npm CLI package
        run: pnpm --dir apps/cli build

      - name: Pack npm CLI package
        run: pnpm --dir apps/cli pack --pack-destination ../../dist/release

      - name: Upload release assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: loom-release-assets-${{ github.sha }}
          path: |
            dist/release/loom-linux-x64.tar.gz
            dist/release/loom-linux-arm64.tar.gz
            dist/release/loom-darwin-x64.tar.gz
            dist/release/loom-darwin-arm64.tar.gz
            dist/release/loom-windows-x64.zip
            dist/release/loom-windows-arm64.zip
            dist/release/loom-cli-*.tgz
          if-no-files-found: error
