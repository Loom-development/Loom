version: 1
name: loom-dotnet
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  app:
    type: dotnet
    image: mcr.microsoft.com/dotnet/sdk:8.0
    workdir: /workspace/src
    command: dotnet restore && dotnet run --urls http://0.0.0.0:5000
    ports:
      - "5000:5000"
    volumes:
      - ./:/workspace
routes:
  - host: dotnet.loom.local
    service: app
    port: 5000
    https: true
