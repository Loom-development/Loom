version: 1
name: loom-serverless
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  app:
    type: node
    image: node:24-alpine
    workdir: /workspace
    command: npm install && npm run dev
    ports:
      - "3007:3007"
    volumes:
      - ./:/workspace
routes:
  - host: serverless.loom.local
    service: app
    port: 3007
    https: true
