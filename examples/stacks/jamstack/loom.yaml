version: 1
name: loom-jamstack
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  app:
    type: node
    image: node:24-alpine
    workdir: /workspace
    command: npm install && npm run dev -- --host 0.0.0.0 --port 5174
    ports:
      - "5174:5174"
    volumes:
      - ./:/workspace
routes:
  - host: jamstack.loom.local
    service: app
    port: 5174
    https: true
