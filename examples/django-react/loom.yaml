version: 1
name: django-react-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  backend:
    type: python
    image: ${PYTHON_IMAGE:-docker.io/library/python:3.12-slim}
    user: ${HOST_UID:-1000}:${HOST_GID:-1000}
    userns: keep-id
    execUser: ${HOST_UID:-1000}:${HOST_GID:-1000}
    workdir: /workspace/backend
    command: |
      set -eu
      home_dir="/tmp/loom-home"
      mkdir -p "$home_dir/.cache/pip"
      chmod 0777 "$home_dir"
      exec env HOME="$home_dir" PATH="$home_dir/.local/bin:$PATH" PIP_CACHE_DIR="$home_dir/.cache/pip" sh -lc 'pip install --disable-pip-version-check --user -r requirements.txt && python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8001'
    ports:
      - "8001:8001"
    volumes:
      - ./:/workspace
    healthcheck:
      command: python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2)"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 120
      startPeriodSeconds: 4
  web:
    type: node
    image: ${NODE_IMAGE:-docker.io/library/node:24-alpine}
    dependsOn:
      - backend
    user: ${HOST_UID:-1000}:${HOST_GID:-1000}
    userns: keep-id
    execUser: ${HOST_UID:-1000}:${HOST_GID:-1000}
    workdir: /workspace/frontend
    command: |
      set -eu
      home_dir="/tmp/loom-home"
      mkdir -p "$home_dir/.npm"
      chmod 0777 "$home_dir"
      exec env HOME="$home_dir" npm_config_cache="$home_dir/.npm" sh -lc 'npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5176'
    ports:
      - "5176:5176"
    volumes:
      - ./:/workspace
    healthcheck:
      command: node -e "fetch('http://127.0.0.1:5176').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 120
      startPeriodSeconds: 5
routes:
  - host: django-react.loom.local
    service: web
    port: 5176
    https: true
tasks:
  test:
    service: backend
    command: python manage.py check