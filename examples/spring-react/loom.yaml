version: 1
name: loom-spring-react
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  backend:
    type: java
    image: ${JAVA_IMAGE:-maven:3.9-eclipse-temurin-21}
    workdir: /workspace/backend
    command: mvn spring-boot:run -Dspring-boot.run.jvmArguments="-Dserver.address=0.0.0.0 -Dserver.port=8080"
    ports:
      - "8081:8080"
    volumes:
      - ./:/workspace
  web:
    type: node
    image: ${NODE_IMAGE:-node:22-alpine}
    workdir: /workspace/frontend
    command: sh -lc "npm install && npm run build && exec npm run serve"
    ports:
      - "5175:5175"
    volumes:
      - ./:/workspace
    dependsOn:
      - backend
    healthcheck:
      command: node -e "fetch('http://127.0.0.1:5175').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      intervalSeconds: 5
      timeoutSeconds: 5
      retries: 80
      startPeriodSeconds: 10
routes:
  - host: spring-react.loom.local
    service: web
    port: 5175
    https: true
