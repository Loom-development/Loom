version: 1
name: loom-serverless
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  api:
    type: node
    image: ${NODE_IMAGE:-docker.io/library/node:22-alpine}
    userns: keep-id
    workdir: /workspace
    command: npm run dev:api
    ports:
      - "3007:3007"
    volumes:
      - ./:/workspace
    healthcheck:
      command: node -e "fetch('http://127.0.0.1:3007/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 80
      startPeriodSeconds: 6
  web:
    type: node
    image: ${NODE_IMAGE:-docker.io/library/node:22-alpine}
    userns: keep-id
    workdir: /workspace
    command: npm run dev:web
    ports:
      - "3008:3008"
    volumes:
      - ./:/workspace
    healthcheck:
      command: node -e "fetch('http://127.0.0.1:3008').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 80
      startPeriodSeconds: 6
routes:
  - host: serverless.loom.local
    service: web
    port: 3008
    https: true
tasks:
  test:
    service: api
    command: npm run invoke:health
