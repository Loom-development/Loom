<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loom Serverless 2026</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Serverless Template</p>
        <h1>Static frontend. Function backend.</h1>
        <p class="lede">
          This example pairs a small SPA with FaaS-style HTTP handlers, so the browser stays static and the backend stays event-driven.
        </p>
      </section>
      <section class="grid">
        <article class="card">
          <h2>Backend health</h2>
          <pre id="health">Loading...</pre>
        </article>
        <article class="card">
          <h2>Content feed</h2>
          <pre id="feed">Loading...</pre>
        </article>
        <article class="card card-wide">
          <h2>Webhook test</h2>
          <button id="sendWebhook" type="button">Send sample webhook</button>
          <pre id="webhook">Waiting for input...</pre>
        </article>
      </section>
    </main>
    <script src="/app.js" defer></script>
  </body>
  </html>
