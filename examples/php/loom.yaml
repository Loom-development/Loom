version: 1
name: php-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  app:
    type: php
    image: php:8.3-apache
    workdir: /var/www/html
    command: |
      if [ ! -f /var/www/html/index.php ]; then
        printf '%s\n' '<?php echo "Loom PHP example is running.";' > /var/www/html/index.php
      fi
      apache2-foreground
    ports:
      - "8085:80"
    volumes:
      - ./:/var/www/html
  db:
    type: postgres
    image: postgres:16-alpine
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    env:
      POSTGRES_USER: loom
      POSTGRES_PASSWORD: loom
      POSTGRES_DB: app
routes:
  - host: php.loom.local
    service: app
    port: 80
    https: true
tasks:
  test:
    service: app
    command: php artisan test
