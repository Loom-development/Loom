version: 1
name: php-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  app:
    type: php
    image: ${PHP_IMAGE:-dunglas/frankenphp:1-php8.3}
    workdir: /app
    command: |
      if [ ! -f /app/index.php ]; then
        printf '%s\n' '<?php echo "Loom PHP example is running.";' > /app/index.php
      fi
      frankenphp php-server --listen :80 --root /app
    ports:
      - "8085:80"
    volumes:
      - ./:/app
  db:
    type: postgres
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    env:
      POSTGRES_USER: loom
      POSTGRES_PASSWORD: loom
      POSTGRES_DB: app
routes:
  - host: php.loom.local
    service: app
    port: 80
    https: true
tasks:
  test:
    service: app
    command: php artisan test
