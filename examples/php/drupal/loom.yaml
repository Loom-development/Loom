version: 1
name: php-drupal-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  cache:
    type: memcached
    image: ${MEMCACHED_IMAGE:-docker.io/library/memcached:1.6-alpine}
  app:
    type: php
    image: ${PHP_IMAGE:-docker.io/library/php:8.3-fpm-alpine}
    composer: false
    user: root
    userns: keep-id
    workdir: /app
    command: |
      set -eu
      target_uid="${HOST_UID:-1000}"
      target_gid="${HOST_GID:-1000}"
      if ! php -r "exit(extension_loaded('mysqli') && extension_loaded('pdo_mysql') && extension_loaded('pdo_pgsql') && extension_loaded('pgsql') && extension_loaded('pdo_sqlite') && extension_loaded('intl') && extension_loaded('zip') && extension_loaded('exif') && extension_loaded('imagick') && extension_loaded('memcached') ? 0 : 1);"; then
        if command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends imagemagick libicu-dev libmagickwand-dev libmemcached-dev libsasl2-dev libzip-dev libpq-dev libsqlite3-dev libmariadb-dev pkg-config util-linux zlib1g-dev
        elif command -v apk >/dev/null 2>&1; then
          apk update && apk add --no-cache cyrus-sasl-dev imagemagick imagemagick-dev icu-dev libmemcached-dev libzip-dev postgresql-dev sqlite-dev mariadb-connector-c-dev pkgconf util-linux zlib-dev
        fi
        docker-php-ext-install -j"$(getconf _NPROCESSORS_ONLN 2>/dev/null || nproc 2>/dev/null || echo 1)" mysqli pdo_mysql pdo_pgsql pgsql pdo_sqlite intl zip exif
        printf '\n' | pecl install imagick
        printf '\n' | pecl install memcached
        docker-php-ext-enable imagick
        docker-php-ext-enable memcached
      fi
      if [ -f /usr/local/etc/php-fpm.d/www.conf ]; then
        mkdir -p /tmp/pool.d
        cp /usr/local/etc/php-fpm.d/*.conf /tmp/pool.d/
        sed "s/^user = .*/user = $target_uid/" /tmp/pool.d/www.conf | sed "s/^group = .*/group = $target_gid/" > /tmp/pool.d/www.conf.tmp && mv /tmp/pool.d/www.conf.tmp /tmp/pool.d/www.conf
        sed "s|^include\s*=.*|include=/tmp/pool.d/*.conf|" /usr/local/etc/php-fpm.conf > /tmp/php-fpm.conf
        sed "s/\[global\]/[global]\nerror_log = /dev\/stderr/" /tmp/php-fpm.conf > /tmp/php-fpm-fixed.conf && mv /tmp/php-fpm-fixed.conf /tmp/php-fpm.conf
        exec php-fpm -y /tmp/php-fpm.conf --nodaemonize
      fi
      exec php-fpm
    volumes:
      - ./:/app
      - ./data/files:/app/web/sites/default/files
    healthcheck:
      command: pgrep -x php-fpm || exit 1
      intervalSeconds: 3
      timeoutSeconds: 3
      retries: 10
      startPeriodSeconds: 300
    dependsOn:
      - cache
    env:
      MEMCACHED_HOST: cache
      MEMCACHED_PORT: "11211"
  web:
    type: nginx
    image: ${NGINX_IMAGE:-docker.io/library/nginx:alpine}
    dependsOn:
      - app
    ports:
      - "8091:80"
    volumes:
      - ./:/app:ro
    command: |
      set -eu
      cat > /etc/nginx/conf.d/default.conf << 'NGINX_CONF'
      server {
          listen 80;
          root /app/web;
          index index.php index.html;
          location / {
              try_files $uri $uri/ /index.php?$query_string;
          }
          location ~ \.php$ {
              include fastcgi_params;
              fastcgi_pass app:9000;
              fastcgi_index index.php;
              fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
          }
      }
      NGINX_CONF
      exec nginx -g 'daemon off;'
    healthcheck:
      command: wget -q -O- http://127.0.0.1:80
      intervalSeconds: 3
      timeoutSeconds: 3
      retries: 20
      startPeriodSeconds: 60
routes:
  - host: drupal.loom.local
    service: web
    port: 80
    https: true
tasks:
  test:
    service: app
    command: php -v
