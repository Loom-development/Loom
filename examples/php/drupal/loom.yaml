version: 1
name: php-drupal-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  db:
    type: mysql
    image: ${MYSQL_IMAGE:-mysql:8.4}
    volumes:
      - ./data/mysql:/var/lib/mysql
    env:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: drupal
      MYSQL_USER: drupal
      MYSQL_PASSWORD: drupal
    ports:
      - "3308:3306"
    healthcheck:
      command: mysqladmin ping -h 127.0.0.1 -proot
      intervalSeconds: 5
      timeoutSeconds: 5
      retries: 30
      startPeriodSeconds: 5
  app:
    type: php
    image: ${PHP_IMAGE:-dunglas/frankenphp:1-php8.3}
    workdir: /app
    command: |
      frankenphp php-server --listen :80 --root /app/web
    volumes:
      - ./:/app
      - ./data/files:/app/web/sites/default/files
    dependsOn:
      - db
    env:
      DRUPAL_DATABASE_DRIVER: mysql
      DRUPAL_DATABASE_HOST: db
      DRUPAL_DATABASE_PORT: "3306"
      DRUPAL_DATABASE_NAME: drupal
      DRUPAL_DATABASE_USERNAME: drupal
      DRUPAL_DATABASE_PASSWORD: drupal
    ports:
      - "8091:80"
    healthcheck:
      command: php -r "exit((int)!@fsockopen('127.0.0.1', 80));"
      intervalSeconds: 3
      timeoutSeconds: 3
      retries: 20
      startPeriodSeconds: 5
routes:
  - host: drupal.loom.local
    service: app
    port: 80
    https: true
tasks:
  test:
    service: app
    command: php -v
