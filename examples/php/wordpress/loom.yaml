version: 1
name: php-wordpress-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  cache:
    type: memcached
    image: ${MEMCACHED_IMAGE:-docker.io/library/memcached:1.6-alpine}
  app:
    type: php
    image: ${WORDPRESS_IMAGE:-docker.io/library/wordpress:6-php8.3-apache}
    composer: false
    user: root
    userns: keep-id
    execUser: ${HOST_UID:-1000}:${HOST_GID:-1000}
    workdir: /var/www/html
    entrypoint: ""
    command: |
      set -eu
      target_uid="${HOST_UID:-1000}"
      target_gid="${HOST_GID:-1000}"
      if ! php -r "exit(extension_loaded('memcached') ? 0 : 1);"; then
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y --no-install-recommends libmemcached-dev libsasl2-dev libz-dev
        printf 'yes\n\n\n\n\n\n\n' | pecl install memcached
        docker-php-ext-enable memcached
      fi
      current_gid="$(getent group www-data | cut -d: -f3)"
      if [ "$current_gid" != "$target_gid" ]; then
        if getent group "$target_gid" >/dev/null 2>&1; then
          existing_group="$(getent group "$target_gid" | cut -d: -f1)"
          usermod -g "$existing_group" www-data
        else
          groupmod -o -g "$target_gid" www-data
        fi
      fi
      current_uid="$(id -u www-data)"
      if [ "$current_uid" != "$target_uid" ]; then
        if getent passwd "$target_uid" >/dev/null 2>&1; then
          existing_user="$(getent passwd "$target_uid" | cut -d: -f1)"
          usermod -l loom-www-data -m -d /var/www -s /usr/sbin/nologin "$existing_user" >/dev/null 2>&1 || true
        fi
        usermod -o -u "$target_uid" www-data
      fi
      exec docker-entrypoint.sh apache2-foreground
    volumes:
      - ./wp-content:/var/www/html/wp-content
    dependsOn:
      - cache
    env:
      MEMCACHED_HOST: cache
      MEMCACHED_PORT: "11211"
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST:-db:3306}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wordpress}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-}
      WORDPRESS_AUTH_KEY: ${WORDPRESS_AUTH_KEY:-put your unique phrase here}
      WORDPRESS_SECURE_AUTH_KEY: ${WORDPRESS_SECURE_AUTH_KEY:-put your unique phrase here}
      WORDPRESS_LOGGED_IN_KEY: ${WORDPRESS_LOGGED_IN_KEY:-put your unique phrase here}
      WORDPRESS_NONCE_KEY: ${WORDPRESS_NONCE_KEY:-put your unique phrase here}
      WORDPRESS_AUTH_SALT: ${WORDPRESS_AUTH_SALT:-put your unique phrase here}
      WORDPRESS_SECURE_AUTH_SALT: ${WORDPRESS_SECURE_AUTH_SALT:-put your unique phrase here}
      WORDPRESS_LOGGED_IN_SALT: ${WORDPRESS_LOGGED_IN_SALT:-put your unique phrase here}
      WORDPRESS_NONCE_SALT: ${WORDPRESS_NONCE_SALT:-put your unique phrase here}
      HOST_UID: ${HOST_UID:-1000}
      HOST_GID: ${HOST_GID:-1000}
    ports:
      - "8090:80"
    healthcheck:
      command: php -r "exit((int)!@fsockopen('127.0.0.1', 80));"
      intervalSeconds: 3
      timeoutSeconds: 3
      retries: 20
      startPeriodSeconds: 300
routes:
  - host: wordpress.loom.local
    service: app
    port: 80
    https: true
tasks:
  test:
    service: app
    command: php -v
