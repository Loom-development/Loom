version: 1
name: php-wordpress-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  db:
    type: mysql
    image: ${MYSQL_IMAGE:-docker.io/library/mysql:8.4}
    volumes:
      - ./data/mysql:/var/lib/mysql
    env:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    ports:
      - "3307:3306"
    healthcheck:
      command: mysqladmin ping -h 127.0.0.1 -proot
      intervalSeconds: 5
      timeoutSeconds: 5
      retries: 30
      startPeriodSeconds: 5
  cache:
    type: memcached
    image: ${MEMCACHED_IMAGE:-docker.io/library/memcached:1.6-alpine}
    ports:
      - "11214:11211"
  app:
    type: php
    image: ${PHP_IMAGE:-docker.io/library/php:8.3-apache}
    composer: false
    user: root
    userns: keep-id
    execUser: ${HOST_UID:-1000}:${HOST_GID:-1000}
    workdir: /var/www/html
    command: |
      set -eu
      target_uid="${HOST_UID:-1000}"
      target_gid="${HOST_GID:-1000}"
      if ! php -r "exit(extension_loaded('mysqli') && extension_loaded('pdo_mysql') && extension_loaded('gd') && extension_loaded('zip') && extension_loaded('intl') && extension_loaded('exif') && extension_loaded('imagick') && extension_loaded('memcached') ? 0 : 1);"; then
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y --no-install-recommends imagemagick libfreetype6-dev libicu-dev libjpeg62-turbo-dev libmagickwand-dev libmemcached-dev libpng-dev libsasl2-dev libwebp-dev libzip-dev zlib1g-dev
        docker-php-ext-configure gd --with-freetype --with-jpeg --with-webp
        docker-php-ext-install -j"$(getconf _NPROCESSORS_ONLN 2>/dev/null || nproc 2>/dev/null || echo 1)" mysqli pdo_mysql gd intl zip exif
        printf '\n' | pecl install imagick
        printf '\n' | pecl install memcached
        docker-php-ext-enable imagick
        docker-php-ext-enable memcached
      fi
      current_gid="$(getent group www-data | cut -d: -f3)"
      if [ "$current_gid" != "$target_gid" ]; then
        if getent group "$target_gid" >/dev/null 2>&1; then
          existing_group="$(getent group "$target_gid" | cut -d: -f1)"
          usermod -g "$existing_group" www-data
        else
          groupmod -o -g "$target_gid" www-data
        fi
      fi
      current_uid="$(id -u www-data)"
      if [ "$current_uid" != "$target_uid" ]; then
        if getent passwd "$target_uid" >/dev/null 2>&1; then
          existing_user="$(getent passwd "$target_uid" | cut -d: -f1)"
          usermod -l loom-www-data -m -d /var/www -s /usr/sbin/nologin "$existing_user" >/dev/null 2>&1 || true
        fi
        usermod -o -u "$target_uid" www-data
      fi
      a2enmod rewrite >/dev/null 2>&1
      if ! grep -Eq '^Listen 8090$' /etc/apache2/ports.conf; then
        printf '\nListen 8090\n' >>/etc/apache2/ports.conf
      fi
      if ! grep -Eq '<VirtualHost \*:80 \*:8090>' /etc/apache2/sites-enabled/000-default.conf; then
        perl -0pi -e 's/<VirtualHost \*:80>/<VirtualHost *:80 *:8090>/' /etc/apache2/sites-enabled/000-default.conf
      fi
      cat >/etc/apache2/conf-enabled/loom-wordpress.conf <<'EOF'
      ServerName localhost
      <Directory /var/www/html>
        AllowOverride All
        Require all granted
      </Directory>
      EOF
      apache2-foreground
    volumes:
      - ./:/var/www/html
    dependsOn:
      - db
      - cache
    env:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      MEMCACHED_HOST: cache
      MEMCACHED_PORT: "11211"
      HOST_UID: ${HOST_UID:-1000}
      HOST_GID: ${HOST_GID:-1000}
    ports:
      - "8090:80"
    healthcheck:
      command: php -r "exit((int)!@fsockopen('127.0.0.1', 80));"
      intervalSeconds: 3
      timeoutSeconds: 3
      retries: 20
      startPeriodSeconds: 300
routes:
  - host: wordpress.loom.local
    service: app
    port: 80
    https: true
tasks:
  test:
    service: app
    command: php -v
