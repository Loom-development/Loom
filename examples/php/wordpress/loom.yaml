version: 1
name: php-wordpress-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  db:
    type: mysql
    image: ${MYSQL_IMAGE:-mysql:8.4}
    volumes:
      - ./data/mysql:/var/lib/mysql
    env:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    ports:
      - "3307:3306"
    healthcheck:
      command: mysqladmin ping -h 127.0.0.1 -proot
      intervalSeconds: 5
      timeoutSeconds: 5
      retries: 30
      startPeriodSeconds: 5
  app:
    type: php
    image: ${PHP_IMAGE:-php:8.3-apache}
    command: |
      a2enmod rewrite >/dev/null 2>&1
      cat >/etc/apache2/conf-enabled/loom-wordpress.conf <<'EOF'
      <Directory /var/www/html>
        AllowOverride All
        Require all granted
      </Directory>
      EOF
      apache2-foreground
    volumes:
      - ./:/var/www/html
    dependsOn:
      - db
    env:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    ports:
      - "8090:80"
    healthcheck:
      command: php -r "exit((int)!@fsockopen('127.0.0.1', 80));"
      intervalSeconds: 3
      timeoutSeconds: 3
      retries: 20
      startPeriodSeconds: 5
routes:
  - host: wordpress.loom.local
    service: app
    port: 80
    https: true
tasks:
  test:
    service: app
    command: php -v
