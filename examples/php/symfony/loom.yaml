version: 1
name: php-symfony-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  app:
    type: php
    image: ${PHP_IMAGE:-dunglas/frankenphp:1-php8.3}
    workdir: /app
    command: frankenphp php-server --listen :8092 --root /app/public
    ports:
      - "8092:8092"
    volumes:
      - ./:/app
    healthcheck:
      command: php -r "exit((int)!@fsockopen('127.0.0.1', 8092));"
      intervalSeconds: 3
      timeoutSeconds: 3
      retries: 240
      startPeriodSeconds: 5
routes:
  - host: symfony.loom.local
    service: app
    port: 8092
    https: true
tasks:
  test:
    service: app
    command: php bin/console about
