version: 1
name: php-symfony-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  cache:
    type: memcached
    image: ${MEMCACHED_IMAGE:-docker.io/library/memcached:1.6-alpine}
  app:
    type: php
    image: ${PHP_IMAGE:-docker.io/library/php:8.3-fpm-alpine}
    workdir: /app
    command: |
      set -eu
      if ! php -r "exit(extension_loaded('mysqli') && extension_loaded('pdo_mysql') && extension_loaded('pdo_pgsql') && extension_loaded('pgsql') && extension_loaded('pdo_sqlite') && extension_loaded('intl') && extension_loaded('zip') && extension_loaded('exif') && extension_loaded('imagick') && extension_loaded('memcached') ? 0 : 1);"; then
        if command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends imagemagick libicu-dev libmagickwand-dev libmemcached-dev libsasl2-dev libzip-dev libpq-dev libsqlite3-dev libmariadb-dev pkg-config zlib1g-dev
        elif command -v apk >/dev/null 2>&1; then
          apk update && apk add --no-cache cyrus-sasl-dev imagemagick imagemagick-dev icu-dev libmemcached-dev libzip-dev postgresql-dev sqlite-dev mariadb-connector-c-dev pkgconf zlib-dev
        fi
        docker-php-ext-install -j"$(getconf _NPROCESSORS_ONLN 2>/dev/null || nproc 2>/dev/null || echo 1)" mysqli pdo_mysql pdo_pgsql pgsql pdo_sqlite intl zip exif
        printf '\n' | pecl install imagick
        printf '\n' | pecl install memcached
        docker-php-ext-enable imagick
        docker-php-ext-enable memcached
      fi
      export MEMCACHED_HOST="${MEMCACHED_HOST:-cache}"
      export MEMCACHED_PORT="${MEMCACHED_PORT:-11211}"
      exec php-fpm
    dependsOn:
      - cache
    env:
      MEMCACHED_HOST: cache
      MEMCACHED_PORT: "11211"
    volumes:
      - ./:/app
  web:
    type: nginx
    image: ${NGINX_IMAGE:-docker.io/library/nginx:alpine}
    dependsOn:
      - app
    ports:
      - "8092:8092"
    volumes:
      - ./:/app:ro
    command: |
      set -eu
      cat > /etc/nginx/conf.d/default.conf << 'NGINX_CONF'
      server {
          listen 8092;
          root /app/public;
          index index.php index.html;
          location / {
              try_files $uri $uri/ /index.php?$query_string;
          }
          location ~ \.php$ {
              include fastcgi_params;
              fastcgi_pass app:9000;
              fastcgi_index index.php;
              fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
          }
      }
      NGINX_CONF
      exec nginx -g 'daemon off;'
    healthcheck:
      command: wget -q -O- http://127.0.0.1:8092
      intervalSeconds: 3
      timeoutSeconds: 3
      retries: 240
      startPeriodSeconds: 60
routes:
  - host: symfony.loom.local
    service: web
    port: 8092
    https: true
tasks:
  test:
    service: app
    command: php bin/console about
