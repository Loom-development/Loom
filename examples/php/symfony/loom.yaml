version: 1
name: php-symfony-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  cache:
    type: memcached
    image: ${MEMCACHED_IMAGE:-docker.io/library/memcached:1.6-alpine}
    ports:
      - "11213:11211"
  app:
    type: php
    image: ${PHP_IMAGE:-docker.io/dunglas/frankenphp:1-php8.3}
    workdir: /app
    command: |
      set -eu
      if ! php -r "exit(extension_loaded('mysqli') && extension_loaded('pdo_mysql') && extension_loaded('pdo_pgsql') && extension_loaded('pgsql') && extension_loaded('pdo_sqlite') && extension_loaded('intl') && extension_loaded('zip') && extension_loaded('exif') && extension_loaded('imagick') && extension_loaded('memcached') ? 0 : 1);"; then
        if command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends imagemagick libicu-dev libmagickwand-dev libmemcached-dev libsasl2-dev libzip-dev libpq-dev libsqlite3-dev libmariadb-dev pkg-config zlib1g-dev
        elif command -v apk >/dev/null 2>&1; then
          apk add --no-cache cyrus-sasl-dev imagemagick imagemagick-dev icu-dev libmemcached-dev libzip-dev postgresql-dev sqlite-dev mariadb-connector-c-dev pkgconf zlib-dev
        fi
        docker-php-ext-install -j"$(getconf _NPROCESSORS_ONLN 2>/dev/null || nproc 2>/dev/null || echo 1)" mysqli pdo_mysql pdo_pgsql pgsql pdo_sqlite intl zip exif
        printf '\n' | pecl install imagick
        printf '\n' | pecl install memcached
        docker-php-ext-enable imagick
        docker-php-ext-enable memcached
      fi
      export MEMCACHED_HOST="${MEMCACHED_HOST:-cache}"
      export MEMCACHED_PORT="${MEMCACHED_PORT:-11211}"
      frankenphp php-server --listen :8092 --root /app/public
    dependsOn:
      - cache
    env:
      MEMCACHED_HOST: cache
      MEMCACHED_PORT: "11211"
    ports:
      - "8092:8092"
    volumes:
      - ./:/app
    healthcheck:
      command: php -r "exit((int)!@fsockopen('127.0.0.1', 8092));"
      intervalSeconds: 3
      timeoutSeconds: 3
      retries: 240
      startPeriodSeconds: 300
routes:
  - host: symfony.loom.local
    service: app
    port: 8092
    https: true
tasks:
  test:
    service: app
    command: php bin/console about
