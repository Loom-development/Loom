version: 1
name: loom-db-sqlite
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  db:
    type: sqlite
    image: ${SQLITE_IMAGE:-alpine:3.20}
    command: sh -lc "apk add --no-cache sqlite && sqlite3 /data/loom.db 'select 1;' && tail -f /dev/null"
    workdir: /data
    volumes:
      - ./data/sqlite:/data
