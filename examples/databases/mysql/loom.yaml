version: 1
name: loom-db-mysql
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  db:
    type: mysql
    image: ${MYSQL_IMAGE:-docker.io/library/mysql:8.4}
    env:
      MYSQL_ROOT_PASSWORD: loomroot
      MYSQL_DATABASE: loom
      MYSQL_USER: loom
      MYSQL_PASSWORD: loom
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      command: mysqladmin ping -h 127.0.0.1 -uroot -ploomroot
      intervalSeconds: 3
      timeoutSeconds: 3
      retries: 30
      startPeriodSeconds: 10
