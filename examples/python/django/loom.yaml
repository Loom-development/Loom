version: 1
name: python-django-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  app:
    type: python
    image: ${PYTHON_IMAGE:-docker.io/library/python:3.12-slim}
    user: root
    userns: keep-id
    execUser: ${HOST_UID:-1000}:${HOST_GID:-1000}
    workdir: /workspace
    command: |
      set -eu
      target_uid="${HOST_UID:-1000}"
      target_gid="${HOST_GID:-1000}"
      home_dir="/tmp/loom-home"
      if [ ! -f /tmp/loom-python-build-deps.installed ]; then
        if command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends build-essential pkg-config default-libmysqlclient-dev libpq-dev libsqlite3-dev util-linux
        elif command -v apk >/dev/null 2>&1; then
          apk add --no-cache build-base pkgconf mariadb-connector-c-dev postgresql-dev sqlite-dev util-linux
        fi
        touch /tmp/loom-python-build-deps.installed
      fi
      mkdir -p "$home_dir"
      chmod 0777 "$home_dir"
      exec setpriv --reuid "$target_uid" --regid "$target_gid" --clear-groups env HOME="$home_dir" PATH="$home_dir/.local/bin:$PATH" PIP_CACHE_DIR="$home_dir/.cache/pip" sh -lc 'pip install --user -r requirements.txt && python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8001'
    ports:
      - "8001:8001"
    volumes:
      - ./:/workspace
    healthcheck:
      command: python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2)"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 120
      startPeriodSeconds: 8
routes:
  - host: django.loom.local
    service: app
    port: 8001
    https: true
tasks:
  test:
    service: app
    command: python manage.py test
