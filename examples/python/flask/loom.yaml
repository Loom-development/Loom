version: 1
name: python-flask-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  app:
    type: python
    image: ${PYTHON_IMAGE:-python:3.12-slim}
    workdir: /workspace
    command: pip install -r requirements.txt && flask --app app run --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    volumes:
      - ./:/workspace
    healthcheck:
      command: python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=2)"
      intervalSeconds: 3
      timeoutSeconds: 3
      retries: 120
      startPeriodSeconds: 2
routes:
  - host: flask.loom.local
    service: app
    port: 8002
    https: true
tasks:
  test:
    service: app
    command: python -c "import app; print('flask app ok')"
