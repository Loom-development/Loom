version: 1
name: python-fastapi-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  app:
    type: python
    image: ${PYTHON_IMAGE:-python:3.12-slim}
    workdir: /workspace
    command: pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    volumes:
      - ./:/workspace
    healthcheck:
      command: python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health', timeout=2)"
      intervalSeconds: 3
      timeoutSeconds: 3
      retries: 120
      startPeriodSeconds: 2
routes:
  - host: fastapi.loom.local
    service: app
    port: 8003
    https: true
tasks:
  test:
    service: app
    command: python -c "import app.main; print('fastapi app ok')"
