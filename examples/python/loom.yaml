version: 1
name: python-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  app:
    type: python
    image: ${PYTHON_IMAGE:-docker.io/library/python:3.12-slim}
    user: root
    userns: keep-id
    execUser: ${HOST_UID:-1000}:${HOST_GID:-1000}
    workdir: /app
    command: |
      set -eu
      target_uid="${HOST_UID:-1000}"
      target_gid="${HOST_GID:-1000}"
      home_dir="/tmp/loom-home"
      if [ ! -f /tmp/loom-python-build-deps.installed ]; then
        if command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends build-essential pkg-config default-libmysqlclient-dev libpq-dev libsqlite3-dev util-linux
        elif command -v apk >/dev/null 2>&1; then
          apk add --no-cache build-base pkgconf mariadb-connector-c-dev postgresql-dev sqlite-dev util-linux
        fi
        touch /tmp/loom-python-build-deps.installed
      fi
      mkdir -p "$home_dir"
      chmod 0777 "$home_dir"
      exec setpriv --reuid "$target_uid" --regid "$target_gid" --clear-groups env HOME="$home_dir" PATH="$home_dir/.local/bin:$PATH" sh -lc 'if [ ! -f index.html ]; then printf "%s\n" "Loom Python example is running." > index.html; fi; python -m http.server 8000'
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    healthcheck:
      command: python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=2)"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 90
      startPeriodSeconds: 6
  cache:
    type: redis
    image: ${REDIS_IMAGE:-docker.io/library/redis:7-alpine}
    volumes:
      - ./data/redis:/data
routes:
  - host: python.loom.local
    service: app
    port: 8000
    https: true
tasks:
  test:
    service: app
    command: pytest -q
