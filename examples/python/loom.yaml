version: 1
name: python-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  app:
    type: python
    image: python:3.12-slim
    workdir: /app
    command: |
      if [ ! -f index.html ]; then
        printf '%s\n' 'Loom Python example is running.' > index.html
      fi
      python -m http.server 8000
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
  cache:
    type: redis
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data
routes:
  - host: python.loom.local
    service: app
    port: 8000
    https: true
tasks:
  test:
    service: app
    command: pytest -q
