version: 1
name: spring-boot-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  app:
    type: java
    image: ${JAVA_IMAGE:-docker.io/library/maven:3.9-eclipse-temurin-21}
    userns: keep-id
    execUser: ${HOST_UID:-1000}:${HOST_GID:-1000}
    workdir: /workspace
    command: mvn spring-boot:run -Dspring-boot.run.jvmArguments="-Dserver.address=0.0.0.0 -Dserver.port=8080"
    ports:
      - "8080:8080"
    volumes:
      - ./:/workspace
    healthcheck:
      command: wget -q -O- http://127.0.0.1:8080/api/health || exit 1
      intervalSeconds: 10
      timeoutSeconds: 10
      retries: 60
      startPeriodSeconds: 30
routes:
  - host: spring-boot.loom.local
    service: app
    port: 8080
    https: true
tasks:
  test:
    service: app
    command: mvn test
