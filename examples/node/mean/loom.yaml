version: 1
name: node-mean-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  mongo:
    type: mongodb
    image: ${MONGO_IMAGE:-docker.io/library/mongo:7}
    volumes:
      - ./data/mongodb:/data/db
    ports:
      - "27021:27017"
    healthcheck:
      command: mongosh --quiet --eval "db.adminCommand('ping').ok"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 60
      startPeriodSeconds: 4
  api:
    type: node
    image: ${NODE_IMAGE:-docker.io/library/node:24-alpine}
    user: root
    userns: keep-id
    execUser: ${HOST_UID:-1000}:${HOST_GID:-1000}
    dependsOn:
      - mongo
    workdir: /workspace
    command: |
      set -eu
      target_uid="${HOST_UID:-1000}"
      target_gid="${HOST_GID:-1000}"
      home_dir="/tmp/loom-home"
      if [ ! -f /tmp/loom-node-build-deps.installed ]; then
        if command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends python3 make g++ pkg-config default-libmysqlclient-dev libpq-dev libsqlite3-dev util-linux
        elif command -v apk >/dev/null 2>&1; then
          apk add --no-cache python3 make g++ pkgconf mariadb-connector-c-dev postgresql-dev sqlite-dev util-linux
        fi
        touch /tmp/loom-node-build-deps.installed
      fi
      mkdir -p "$home_dir"
      chmod 0777 "$home_dir"
      exec setpriv --reuid "$target_uid" --regid "$target_gid" --clear-groups env HOME="$home_dir" sh -lc 'npm install && npm start'
    ports:
      - "3001:3001"
    volumes:
      - ./api:/workspace
    env:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: mean
    healthcheck:
      command: node -e "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 80
      startPeriodSeconds: 5
  web:
    type: node
    image: ${NODE_IMAGE:-docker.io/library/node:24-alpine}
    user: root
    userns: keep-id
    execUser: ${HOST_UID:-1000}:${HOST_GID:-1000}
    dependsOn:
      - api
    workdir: /workspace
    command: |
      set -eu
      target_uid="${HOST_UID:-1000}"
      target_gid="${HOST_GID:-1000}"
      home_dir="/tmp/loom-home"
      if [ ! -f /tmp/loom-node-build-deps.installed ]; then
        if command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends python3 make g++ pkg-config default-libmysqlclient-dev libpq-dev libsqlite3-dev util-linux
        elif command -v apk >/dev/null 2>&1; then
          apk add --no-cache python3 make g++ pkgconf mariadb-connector-c-dev postgresql-dev sqlite-dev util-linux
        fi
        touch /tmp/loom-node-build-deps.installed
      fi
      mkdir -p "$home_dir"
      chmod 0777 "$home_dir"
      exec setpriv --reuid "$target_uid" --regid "$target_gid" --clear-groups env HOME="$home_dir" sh -lc 'npm install && npm start'
    ports:
      - "4200:4200"
    volumes:
      - ./web:/workspace
    healthcheck:
      command: node -e "fetch('http://127.0.0.1:4200').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 80
      startPeriodSeconds: 5
routes:
  - host: mean.loom.local
    service: web
    port: 4200
    https: true
tasks:
  test:
    service: api
    command: node -e "console.log('mean ok')"
