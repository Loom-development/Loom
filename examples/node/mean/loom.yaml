version: 1
name: node-mean-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  mongo:
    type: mongodb
    image: ${MONGO_IMAGE:-mongo:7}
    volumes:
      - ./data/mongodb:/data/db
    ports:
      - "27021:27017"
    healthcheck:
      command: mongosh --quiet --eval "db.adminCommand('ping').ok"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 60
      startPeriodSeconds: 4
  api:
    type: node
    image: ${NODE_IMAGE:-node:24-alpine}
    dependsOn:
      - mongo
    workdir: /workspace
    command: npm install && npm start
    ports:
      - "3001:3001"
    volumes:
      - ./api:/workspace
    env:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: mean
    healthcheck:
      command: node -e "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 80
      startPeriodSeconds: 5
  web:
    type: node
    image: ${NODE_IMAGE:-node:24-alpine}
    dependsOn:
      - api
    workdir: /workspace
    command: npm install && npm start
    ports:
      - "4200:4200"
    volumes:
      - ./web:/workspace
    healthcheck:
      command: node -e "fetch('http://127.0.0.1:4200').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 80
      startPeriodSeconds: 5
routes:
  - host: mean.loom.local
    service: web
    port: 4200
    https: true
tasks:
  test:
    service: api
    command: node -e "console.log('mean ok')"
