version: 1
name: node-t3-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  db:
    type: postgres
    image: postgres:16-alpine
    env:
      POSTGRES_USER: loom
      POSTGRES_PASSWORD: loom
      POSTGRES_DB: t3
    ports:
      - "5434:5432"
    healthcheck:
      command: pg_isready -U loom
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 60
      startPeriodSeconds: 4
  app:
    type: node
    image: node:24-alpine
    dependsOn:
      - db
    workdir: /workspace
    command: corepack enable && pnpm install && pnpm db:seed && pnpm dev
    ports:
      - "3003:3003"
    volumes:
      - ./:/workspace
    env:
      DATABASE_URL: postgres://loom:loom@db:5432/t3
      PORT: "3003"
    healthcheck:
      command: node -e "fetch('http://127.0.0.1:3003').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 120
      startPeriodSeconds: 6
routes:
  - host: t3.loom.local
    service: app
    port: 3003
    https: true
tasks:
  test:
    service: app
    command: pnpm typecheck
