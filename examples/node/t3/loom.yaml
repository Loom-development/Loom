version: 1
name: node-t3-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  app:
    type: node
    image: ${NODE_IMAGE:-docker.io/library/node:24-alpine}
    user: root
    userns: keep-id
    execUser: ${HOST_UID:-1000}:${HOST_GID:-1000}
    workdir: /workspace
    command: |
      set -eu
      target_uid="${HOST_UID:-1000}"
      target_gid="${HOST_GID:-1000}"
      home_dir="/tmp/loom-home"
      if [ ! -f /tmp/loom-node-build-deps.installed ]; then
        if command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends python3 make g++ pkg-config default-libmysqlclient-dev libpq-dev libsqlite3-dev util-linux
        elif command -v apk >/dev/null 2>&1; then
          apk update && apk add --no-cache python3 make g++ pkgconf mariadb-connector-c-dev postgresql-dev sqlite-dev util-linux
        fi
        touch /tmp/loom-node-build-deps.installed
      fi
      corepack enable
      mkdir -p "$home_dir"
      chmod 0777 "$home_dir"
      exec setpriv --reuid "$target_uid" --regid "$target_gid" --clear-groups env HOME="$home_dir" sh -lc 'pnpm install && pnpm dev'
    ports:
      - "3003:3003"
    volumes:
      - ./:/workspace
    env:
      PORT: "3003"
    healthcheck:
      command: node -e "fetch('http://127.0.0.1:3003').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 120
      startPeriodSeconds: 6
routes:
  - host: t3.loom.local
    service: app
    port: 3003
    https: true
tasks:
  test:
    service: app
    command: corepack enable && pnpm typecheck
