version: 1
name: node-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  app:
    type: node
    image: ${NODE_IMAGE:-node:24-alpine}
    workdir: /workspace
    command: npm install && npm start
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
routes:
  - host: node.loom.local
    service: app
    port: 3000
    https: true
tasks:
  test:
    service: app
    command: node -e "console.log('node example ok')"
