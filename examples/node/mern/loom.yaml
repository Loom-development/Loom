version: 1
name: node-mern-example
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  mongo:
    type: mongodb
    image: mongo:7
    ports:
      - "27022:27017"
    healthcheck:
      command: mongosh --quiet --eval "db.adminCommand('ping').ok"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 60
      startPeriodSeconds: 4
  api:
    type: node
    image: node:20-alpine
    dependsOn:
      - mongo
    workdir: /workspace
    command: npm install && npm start
    ports:
      - "3002:3002"
    volumes:
      - ./api:/workspace
    env:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: mern
    healthcheck:
      command: node -e "fetch('http://127.0.0.1:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 80
      startPeriodSeconds: 5
  web:
    type: node
    image: node:20-alpine
    dependsOn:
      - api
    workdir: /workspace
    command: npm install && npm start
    ports:
      - "5173:5173"
    volumes:
      - ./web:/workspace
    healthcheck:
      command: node -e "fetch('http://127.0.0.1:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      intervalSeconds: 4
      timeoutSeconds: 4
      retries: 80
      startPeriodSeconds: 5
routes:
  - host: mern.loom.local
    service: web
    port: 5173
    https: true
tasks:
  test:
    service: api
    command: node -e "console.log('mern ok')"
