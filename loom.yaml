version: 1
name: loom-app
runtime:
  engine: podman
  rootless: true
  machine:
    managed: true
services:
  app:
    type: node
    image: docker.io/library/node:24-alpine
    workdir: /workspace
    command: pnpm dev
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
    env:
      NODE_ENV: development
    dependsOn:
      - db
  db:
    type: postgres
    image: docker.io/library/postgres:16-alpine
    env:
      POSTGRES_USER: loom
      POSTGRES_PASSWORD: loom
      POSTGRES_DB: loom
    ports:
      - "5432:5432"
    healthcheck:
      command: pg_isready -U loom
      intervalSeconds: 3
      timeoutSeconds: 3
      retries: 20
      startPeriodSeconds: 2
routes:
  - host: app.loom.local
    service: app
    port: 3000
    https: true
tasks:
  test:
    service: app
    command: pnpm test
